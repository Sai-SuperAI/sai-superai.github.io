theme: minimal-mistakes-jekyll

title: "Sai SuperAI"
description: "AI strategy, practical guides, and applied machine intelligence."
url: "https://sai-superai.github.io"
# Set this to your repository name when hosting as a project site on GitHub Pages
# e.g. if your repo is `Sai-SuperAI`, set baseurl: "/Sai-SuperAI"
baseurl: "/Sai-SuperAI"
author:
  name: "Sai SuperAI"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-polyglot

# Main navigation is provided via `_data/navigation.yml` (Minimal Mistakes)

# Social links (placeholders)
social:
  - icon: github
    link: https://github.com/sai-superai
  - icon: twitter
    link: https://twitter.com/yourhandle

# Minimal Mistakes settings (keep defaults minimal)
collections: {}

# Exclude workflow and node_modules from the build
exclude:
  - node_modules
  - vendor
  - .github

# jekyll-polyglot i18n configuration
languages: ["en", "de"]
default_lang: "en"
# Windows hosts: polyglot recommends disabling parallel builds
parallel_localization: false
exclude_from_localization:
  - assets
  - images
  - css
  - public
  - sitemap.xml
  - feed.xml
  - robots.txt
  - CNAME

# Avoid SCSS sourcemap issues with Jekyll 4 + Polyglot
sass:
  sourcemap: never
