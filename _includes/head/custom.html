{% comment %}
  Custom head additions:
  - Add Polyglot i18n headers (hreflang/canonical)
  - Ensure CSS link is not language-relativized (prevents /de/assets/... 404)
{% endcomment %}

{{ I18n_Headers }}

<link {% static_href %}href="{{ '/assets/css/main.css' | relative_url }}"{% endstatic_href %} rel="stylesheet">
<!-- Font Awesome for small UI icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer" />

<style>
  /* Masthead layout helpers */
  .greedy-nav { display: flex; align-items: center; }

  /* Top-right language dropdown switcher */
  .lang-dd { position: relative; margin-left: auto; }
  .lang-dd button.lang-toggle {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .35rem .6rem; border-radius: 999px; border: 1px solid rgba(0,0,0,.08);
    background: #f7f7f8; color: inherit; cursor: pointer; font-weight: 600;
  }
  .lang-dd button.lang-toggle .fa-globe { opacity: .85; }
  .lang-dd button.lang-toggle .curr { font-size: .85rem; letter-spacing: .02em; }
  .lang-dd .menu {
    position: absolute; right: 0; top: 110%; min-width: 10rem; z-index: 50;
    background: #fff; border: 1px solid rgba(0,0,0,.08); border-radius: .5rem;
    box-shadow: 0 8px 24px rgba(0,0,0,.08); padding: .35rem; display: none;
  }
  .lang-dd.open .menu { display: block; }
  .lang-dd .menu a, .lang-dd .menu span.disabled {
    display: flex; align-items: center; gap: .6rem; padding: .5rem .6rem; border-radius: .4rem;
    color: inherit; text-decoration: none; font-weight: 600; white-space: nowrap;
  }
  .lang-dd .menu a:hover { background: #f1f5f9; }
  .lang-dd .flag { width: 1.1rem; height: 1.1rem; display: inline-flex; align-items: center; justify-content: center; font-size: 1rem; }
  .lang-dd .disabled { opacity: .6; cursor: default; }

  /* Add subtle icons to primary nav links */
  .greedy-nav a[href="/"]::before { font: normal 900 0.95rem/0 'Font Awesome 6 Free'; content: "\f015"; margin-right: .4rem; }
  .greedy-nav a[href$="/about/"]::before { font: normal 900 0.95rem/0 'Font Awesome 6 Free'; content: "\f05a"; margin-right: .4rem; }
  .greedy-nav a[href$="/faq/"]::before { font: normal 900 0.95rem/0 'Font Awesome 6 Free'; content: "\f059"; margin-right: .4rem; }
  .greedy-nav a[href$="/tags/"]::before { font: normal 900 0.95rem/0 'Font Awesome 6 Free'; content: "\f02c"; margin-right: .4rem; }
  .greedy-nav a[href$="/search/"]::before { font: normal 900 0.95rem/0 'Font Awesome 6 Free'; content: "\f002"; margin-right: .4rem; }
  /* Ensure icons don't push text to new line on narrow widths */
  .greedy-nav a { display: inline-flex; align-items: center; gap: .25rem; }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var nav = document.querySelector('.masthead .greedy-nav');
    if (!nav) return;

    // Build absolute URLs for EN/DE versions of the current document
    var urls = {
      en: '{{ site.baseurl }}{% if page.page_id %}{% assign tail_en = '' %}{% assign en_doc = site.pages | where: 'page_id', page.page_id | where: 'lang', 'en' | first %}{% if en_doc == nil %}{% assign en_doc = site.posts | where: 'page_id', page.page_id | where: 'lang', 'en' | first %}{% endif %}{% if en_doc %}{% assign tail_en = en_doc.url %}{% else %}{% assign tail_en = '/' %}{% endif %}{{ tail_en }}{% else %}{{ page.url }}{% endif %}',
      de: '{{ site.baseurl }}{% if page.page_id %}{% assign tail_de = '' %}{% assign de_doc = site.pages | where: 'page_id', page.page_id | where: 'lang', 'de' | first %}{% if de_doc == nil %}{% assign de_doc = site.posts | where: 'page_id', page.page_id | where: 'lang', 'de' | first %}{% endif %}{% if de_doc %}{% assign tail_de = de_doc.url %}{% else %}{% assign tail_de = '/de/' %}{% endif %}{{ tail_de }}{% else %}/de/{{ page.url | replace_first: '/', '' }}{% endif %}'
    };

    var currentLang = document.documentElement.getAttribute('lang') || '{{ site.default_lang }}';

    // Dropdown wrapper
    var dd = document.createElement('div');
    dd.className = 'lang-dd';
    dd.innerHTML = [
      '<button type="button" class="lang-toggle" aria-haspopup="true" aria-expanded="false" aria-label="Language">',
      '  <i class="fa-solid fa-globe"></i>',
      '  <span class="curr">'+ (currentLang === 'de' ? 'DE' : 'EN') +'</span>',
      '  <i class="fa-solid fa-chevron-down" style="font-size:.8rem;opacity:.8"></i>',
      '</button>',
      '<div class="menu" role="menu">',
      currentLang === 'en'
        ? '<span class="disabled" role="menuitem" aria-current="true"><span class="flag">🇬🇧</span> English</span>'+
          '<a role="menuitem" {% static_href %}href="'+ urls.de +'"{% endstatic_href %}><span class="flag">🇩🇪</span> Deutsch</a>'
        : '<a role="menuitem" {% static_href %}href="'+ urls.en +'"{% endstatic_href %}><span class="flag">🇬🇧</span> English</a>'+
          '<span class="disabled" role="menuitem" aria-current="true"><span class="flag">🇩🇪</span> Deutsch</span>',
      '</div>'
    ].join('');

    nav.appendChild(dd);

    // Toggle logic
    var btn = dd.querySelector('button.lang-toggle');
    var menu = dd.querySelector('.menu');
    btn.addEventListener('click', function(){
      var open = dd.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
    document.addEventListener('click', function(e){
      if (!dd.contains(e.target)) { dd.classList.remove('open'); btn.setAttribute('aria-expanded','false'); }
    });
  });
</script>
