{% comment %}
  Custom head additions:
  - Add Polyglot i18n headers (hreflang/canonical)
  - Ensure CSS link is not language-relativized (prevents /de/assets/... 404)
{% endcomment %}

{{ I18n_Headers }}

<link {% static_href %}href="{{ '/assets/css/main.css' | relative_url }}"{% endstatic_href %} rel="stylesheet">

<style>
  /* Top-right language switcher in masthead */
  .greedy-nav { display: flex; align-items: center; }
  .greedy-nav .lang-switcher-masthead {
    margin-left: auto;
    display: inline-flex;
    gap: .35rem;
    align-items: center;
    white-space: nowrap;
  }
  .greedy-nav .lang-switcher-masthead .lang-pill {
    display: inline-flex; align-items: center; gap: .25rem;
    padding: .22rem .5rem; border-radius: 999px;
    background: var(--lang-pill-bg, #f2f2f2); color: inherit;
    text-decoration: none; font-size: .9rem; line-height: 1;
    border: 1px solid rgba(0,0,0,.08);
  }
  .greedy-nav .lang-switcher-masthead .lang-pill[aria-current="page"] {
    background: #e6e6e6; cursor: default;
  }
  .greedy-nav .lang-switcher-masthead .lang-icon { font-size: 1rem; }
  @media (max-width: 480px) {
    .greedy-nav .lang-switcher-masthead .lang-label { display:none; }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var nav = document.querySelector('.masthead .greedy-nav');
    if (!nav) return;
    var wrap = document.createElement('div');
    wrap.className = 'lang-switcher-masthead';
    wrap.innerHTML = (function(){
      var html = '';
      var current = '{{ site.active_lang | default: site.default_lang }}';
      {% for lang in site.languages %}
        {% capture lang_label %}{% if lang == 'en' %}English{% elsif lang == 'de' %}Deutsch{% else %}{{ lang | upcase }}{% endif %}{% endcapture %}
        {% capture lang_emoji %}{% if lang == 'en' %}🌐{% elsif lang == 'de' %}🇩🇪{% else %}🌐{% endif %}{% endcapture %}
        {% capture lang_href %}{{ site.baseurl }}/{% if lang != site.default_lang %}{{ lang }}/{% endif %}{% if page.permalink_lang and page.permalink_lang[lang] %}{{ page.permalink_lang[lang] | replace_first: '/', '' }}{% else %}{{ page.url | replace_first: '/', '' }}{% endif %}{% endcapture %}
        html += '<a class="lang-pill" href="{{ lang_href | strip }}"'+(current==='{{ lang }}'?' aria-current="page"':'')+'>'+
                '<span class="lang-icon">{{ lang_emoji | strip }}</span>'+
                '<span class="lang-label">{{ lang_label | escape }}</span>'+
                '</a>';
      {% endfor %}
      return html;
    })();
    nav.appendChild(wrap);
  });
</script>
